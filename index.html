<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Chocolate Cake — Recipe Card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="card" id="recipe-card">
      <header class="card__header">
        <p class="eyebrow">Recipe Index · No. 014</p>
        <h1 class="title">Midnight Chocolate Cake</h1>
        <p class="tagline">
          Deep cocoa layers, a glossy dark drip, and a cherry that means
          business.
        </p>

        <ul class="meta-row" aria-label="Recipe overview">
          <li class="meta-pill">
            <span class="meta-pill__label">Prep + Bake</span>
            <span class="meta-pill__value" id="prep-time-label">45 min</span>
          </li>
          <li class="meta-pill">
            <span class="meta-pill__label">Serves</span>
            <span class="meta-pill__value">8</span>
          </li>
          <li class="meta-pill">
            <span class="meta-pill__label">Difficulty</span>
            <span class="meta-pill__value">Medium</span>
          </li>
        </ul>
      </header>
    </main>
  </body>
</html>
